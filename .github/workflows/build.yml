name: build-ysfclients

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: linux-${{ matrix.arch }}-${{ matrix.compiler }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            compiler: gcc
          - arch: x86_64
            compiler: clang
          - arch: arm64
            compiler: gcc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make git pkg-config \
            libmosquitto-dev nlohmann-json3-dev
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Build (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          git clone https://github.com/g4klx/YSFClients.git
          cd YSFClients
          mkdir -p ../artifacts/${{ matrix.arch }}-${{ matrix.compiler }}
          set -o pipefail
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            make clean
            make -j2 CC=clang CXX=clang++ 2>&1 | tee ../artifacts/${{ matrix.arch }}-${{ matrix.compiler }}/build.log
          else
            make clean
            make -j2 2>&1 | tee ../artifacts/${{ matrix.arch }}-${{ matrix.compiler }}/build.log
          fi
          cp DGIdGateway/DGIdGateway ../artifacts/${{ matrix.arch }}-${{ matrix.compiler }}/
          cp YSFGateway/YSFGateway ../artifacts/${{ matrix.arch }}-${{ matrix.compiler }}/
          cp YSFParrot/YSFParrot ../artifacts/${{ matrix.arch }}-${{ matrix.compiler }}/

      - name: Build (arm64 via container)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build (arm64 via container - run)
        if: matrix.arch == 'arm64'
        run: |
          mkdir -p artifacts/arm64-gcc
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/work" \
            ubuntu:22.04 bash -lc "\
              apt-get update && \
              apt-get install -y build-essential make git pkg-config \
                libmosquitto-dev nlohmann-json3-dev && \
              git clone https://github.com/g4klx/YSFClients.git /tmp/YSFClients && \
              cd /tmp/YSFClients && \
              make clean && (make -j2 2>&1 | tee /work/artifacts/arm64-gcc/build.log) && \
              cp DGIdGateway/DGIdGateway /work/artifacts/arm64-gcc/ && \
              cp YSFGateway/YSFGateway /work/artifacts/arm64-gcc/ && \
              cp YSFParrot/YSFParrot /work/artifacts/arm64-gcc/\
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ysfclients-linux-${{ matrix.arch }}-${{ matrix.compiler }}
          path: artifacts/${{ matrix.arch }}-${{ matrix.compiler }}/

  build-windows:
    name: windows-${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            platform: x86
          - arch: x64
            platform: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Clone upstream
        run: git clone https://github.com/g4klx/YSFClients.git

      - name: Install dependencies
        run: |
          $ErrorActionPreference = "Stop"
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\\vcpkg" }
          if (-not (Test-Path $vcpkgRoot)) { throw "vcpkg not found at $vcpkgRoot" }
          $triplet = if ("${{ matrix.platform }}" -eq "Win32") { "x86-windows-static" } else { "x64-windows-static" }
          & "$vcpkgRoot\\vcpkg.exe" install mosquitto nlohmann-json --triplet $triplet

      - name: Build
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\${{ matrix.arch }} | Out-Null
          cd YSFClients
          $ErrorActionPreference = "Stop"
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\\vcpkg" }
          $triplet = if ("${{ matrix.platform }}" -eq "Win32") { "x86-windows-static" } else { "x64-windows-static" }
          $env:VCPKG_INCLUDE = "$vcpkgRoot\\installed\\$triplet\\include"
          $env:VCPKG_LIB = "$vcpkgRoot\\installed\\$triplet\\lib"
          $mosquittoStatic = Join-Path $env:VCPKG_LIB "mosquitto_static.lib"
          $mosquittoLib = Join-Path $env:VCPKG_LIB "mosquitto.lib"
          if ((Test-Path $mosquittoStatic) -and (-not (Test-Path $mosquittoLib))) {
            Copy-Item -Path $mosquittoStatic -Destination $mosquittoLib
          }
          $targetsLines = @(
            '<Project>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <RuntimeLibrary>MultiThreaded</RuntimeLibrary>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          $targetsLines | Set-Content Directory.Build.targets
          msbuild YSFClients.sln /m /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:VCPKG_INCLUDE="$env:VCPKG_INCLUDE" /p:VCPKG_LIB="$env:VCPKG_LIB" 2>&1 | Tee-Object -FilePath ..\artifacts\${{ matrix.arch }}\build.log
          $targetsLines = @(
            '<Project>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <AdditionalIncludeDirectories>$(VCPKG_INCLUDE);%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
            '    </ClCompile>',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(VCPKG_LIB);%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>ws2_32.lib;mosquitto.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )
          $targetsLines | Set-Content Directory.Build.targets
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect artifacts
        run: |
          $targets = @("YSFParrot.exe", "YSFGateway.exe", "DGIdGateway.exe")
          foreach ($target in $targets) {
            $found = Get-ChildItem -Path YSFClients -Filter $target -Recurse | Select-Object -First 1
            if (-not $found) { throw "Missing build output: $target" }
            Copy-Item -Path $found.FullName -Destination artifacts\${{ matrix.arch }}\ -Force
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ysfclients-windows-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}

  publish-release:
    name: publish-release
    runs-on: ubuntu-22.04
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets (unique names)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          for d in release-artifacts/*; do
            [ -d "$d" ] || continue
            artifact="$(basename "$d")"
            for f in "$d"/*; do
              [ -f "$f" ] || continue
              base="$(basename "$f")"
              cp "$f" "release-assets/${artifact}-${base}"
            done
          done
          ls -lah release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          overwrite_files: true

